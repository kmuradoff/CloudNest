services:
  postgres:
    image: postgres:16
    container_name: cloudnest-postgres
    environment:
      POSTGRES_DB: cloudnest
      POSTGRES_USER: cloudnest
      POSTGRES_PASSWORD: cloudnest
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: